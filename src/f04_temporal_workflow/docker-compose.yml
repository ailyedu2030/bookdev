version: "3.8"

services:
  temporal:
    image: temporalio/auto-setup:1.24.2
    ports:
      - "7233:7233"   # gRPC
      - "8233:8233"   # HTTP (API)
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development.yaml
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "temporal", "operator", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal-ui:
    image: temporalio/ui:2.28.0
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000,http://localhost:8088
    depends_on:
      temporal:
        condition: service_healthy

  temporal-admin-tools:
    image: temporalio/admin-tools:1.24.2
    stdin_open: true
    tty: true
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    depends_on:
      temporal:
        condition: service_healthy
    profiles:
      - tools

  postgresql:
    image: postgres:12
    environment:
      - POSTGRES_USER=temporal
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_DB=temporal
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Textbook Writing Workers ──────────────────────────────────────
  worker-content-gen:
    build:
      context: ../../
      dockerfile: src/f04_temporal_workflow/Dockerfile.worker
    environment:
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=textbook-writing
      - TEMPORAL_TASK_QUEUE=textbook-writing-queue
      - MOCK_TEMPORAL=${MOCK_TEMPORAL:-false}
      - AI_MODEL=${AI_MODEL:-mock-ai-model-v2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-3}

  worker-quality-check:
    build:
      context: ../../
      dockerfile: src/f04_temporal_workflow/Dockerfile.worker
    environment:
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=textbook-writing
      - TEMPORAL_TASK_QUEUE=quality-check-queue
      - MOCK_TEMPORAL=${MOCK_TEMPORAL:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  worker-security-scan:
    build:
      context: ../../
      dockerfile: src/f04_temporal_workflow/Dockerfile.worker
    environment:
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=textbook-writing
      - TEMPORAL_TASK_QUEUE=security-scan-queue
      - MOCK_TEMPORAL=${MOCK_TEMPORAL:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: textbook-temporal-network
