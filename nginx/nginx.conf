# =============================================================================
# AI多Agent教材编写系统 - Nginx 主配置文件
# SSL Termination + Rate Limiting + WAF
# =============================================================================

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ===================================================================
    # 日志格式
    # ===================================================================
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    log_format security '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status "$http_authorization" "$http_x_csrf_token" '
                        'ua="$http_user_agent" rt=$request_time '
                        'error="$upstream_response_status"';

    access_log /var/log/nginx/access.log main buffer=16k flush=2s;

    # ===================================================================
    # 性能优化
    # ===================================================================
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # ===================================================================
    # 请求大小限制
    # ===================================================================
    client_max_body_size 50m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;
    request_pool_size 4k;

    # ===================================================================
    # Gzip 压缩
    # ===================================================================
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ===================================================================
    # Rate Limiting Zones
    # ===================================================================
    # 通用 API 限制 (100请求/分钟)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/m;

    # 搜索限制 (10请求/分钟)
    limit_req_zone $binary_remote_addr zone=search_limit:10m rate=10r/m;

    # 生成限制 (20请求/分钟 - 资源密集型)
    limit_req_zone $binary_remote_addr zone=generate_limit:10m rate=20r/m;

    # 认证限制 (30请求/分钟)
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=30r/m;

    # 连接限制
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # ===================================================================
    # OpenSSL 配置
    # ===================================================================
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_buffer_size 4k;

    # ===================================================================
    # 安全 Headers
    # ===================================================================
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Request-ID $request_id always;

    # ===================================================================
    # 缓存配置
    # ===================================================================
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;
    proxy_cache_key "$scheme$request_method$host$request_uri";
    proxy_cache_valid 200 60s;
    proxy_cache_valid 404 1m;
    proxy_cache_bypass $cookie_nocache $arg_nocache;
    proxy_no_cache $cookie_nocache $arg_nocache;

    # ===================================================================
    # 上游服务器定义
    # ===================================================================
    upstream textbook_api {
        least_conn;
        server textbook-api:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream textbook_frontend {
        server textbook-frontend:80;
        keepalive 16;
    }

    upstream temporal_ui {
        server temporal-web:8088;
    }

    upstream grafana_ui {
        server grafana:3000;
    }

    upstream prometheus_ui {
        server prometheus:9090;
    }

    # ===================================================================
    # HTTP -> HTTPS 重定向
    # ===================================================================
    server {
        listen 80;
        listen [::]:80;
        server_name ${NGINX_HOST:-localhost};

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            allow all;
        }

        location / {
            return 301 https://$host$request_uri;
        }

        location /healthz {
            access_log off;
            return 200 "OK";
            add_header Content-Type text/plain;
        }
    }

    # ===================================================================
    # HTTPS 主服务器
    # ===================================================================
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name ${NGINX_HOST:-localhost};

        # SSL 证书
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_trusted_certificate /etc/nginx/certs/chain.pem;

        # OCSP Stapling
        ssl_stapling on;
        ssl_stapling_verify on;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ===================================================================
        # 静态文件
        # ===================================================================
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            break;
        }

        # ===================================================================
        # Frontend (React App)
        # ===================================================================
        location / {
            proxy_pass http://textbook_frontend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            add_header X-Frame-Options "SAMEORIGIN" always;
        }

        # ===================================================================
        # API 路由
        # ===================================================================
        include /etc/nginx/conf.d/api.conf;

        # ===================================================================
        # Temporal UI
        # ===================================================================
        location /temporal/ {
            rewrite ^/temporal/(.*) /$1 break;
            proxy_pass http://temporal_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffering off;
        }

        # ===================================================================
        # Grafana
        # ===================================================================
        location /grafana/ {
            rewrite ^/grafana/(.*) /$1 break;
            proxy_pass http://grafana_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ===================================================================
        # Prometheus
        # ===================================================================
        location /prometheus/ {
            rewrite ^/prometheus/(.*) /$1 break;
            proxy_pass http://prometheus_ui;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            # IP 白名单
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
        }

        # ===================================================================
        # Redis Commander (调试 - 仅内网)
        # ===================================================================
        location /redis-commander/ {
            proxy_pass http://redis-commander:8081/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;

            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            allow 127.0.0.1;
            deny all;
        }

        # ===================================================================
        # Metrics (Prometheus 抓取端点 - 仅内网)
        # ===================================================================
        location /metrics {
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            allow 192.168.0.0/16;
            deny all;

            proxy_pass http://textbook_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ===================================================================
        # 健康检查 (不限流)
        # ===================================================================
        location /healthz {
            proxy_pass http://textbook_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }

        location /readyz {
            proxy_pass http://textbook_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            access_log off;
        }

        # ===================================================================
        # Error Pages
        # ===================================================================
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
            internal;
        }
    }
}
