version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: textbook_pg
    environment:
      POSTGRES_DB: textbook_knowledge_graph
      POSTGRES_USER: textbook
      POSTGRES_PASSWORD: textbook_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U textbook -d textbook_knowledge_graph"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - textbook_net

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: textbook_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@textbook.dev
      PGADMIN_DEFAULT_PASSWORD: admin_dev
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - textbook_net

volumes:
  pg_data:
    driver: local

networks:
  textbook_net:
    driver: bridge
