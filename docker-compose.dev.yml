# =============================================================================
# AI多Agent教材编写系统 - 开发环境 docker-compose
# =============================================================================
# 使用方法:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f
# =============================================================================

version: "3.8"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ===========================================================================
  # API (开发模式 - 热重载)
  # ===========================================================================
  textbook-api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: textbook-system/api:dev
    container_name: textbook-api-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql://textbook:textbook@postgres:5432/textbook_dev
      - REDIS_URL=redis://:textbook@redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - LOG_LEVEL=debug
      - DEBUG=true
    ports:
      - "8000:8000"
      - "5678:5678"
    volumes:
      - ./src:/app/src:delegated
      - ./config:/app/config:ro
      - ./scripts:/app/scripts:ro
    command: |
      python -m uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --reload-delay 1 --reload-dir /app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      temporal:
        condition: service_started
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Worker (开发模式)
  # ===========================================================================
  textbook-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: textbook-system/worker:dev
    container_name: textbook-worker-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=development
      - TEMPORAL_HOST=temporal
      - TEMPORAL_PORT=7233
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=postgresql://textbook:textbook@postgres:5432/textbook_dev
      - LOG_LEVEL=debug
    volumes:
      - ./src:/app/src:delegated
    command: |
      python -m temporalio.worker --host temporal --port 7233 --namespace default
    depends_on:
      - temporal
      - kafka
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Frontend (Vite 开发服务器)
  # ===========================================================================
  textbook-frontend:
    image: node:20-alpine
    container_name: textbook-frontend-dev
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app:delegated
    command: |
      sh -c "corepack enable pnpm && pnpm install && pnpm dev --host 0.0.0.0"
    depends_on:
      - textbook-api
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # PostgreSQL 15
  # ===========================================================================
  postgres:
    image: postgres:15-alpine
    container_name: textbook-postgres-dev
    restart: unless-stopped
    environment:
      - POSTGRES_DB=textbook_dev
      - POSTGRES_USER=textbook
      - POSTGRES_PASSWORD=textbook
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U textbook -d textbook_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Redis 7
  # ===========================================================================
  redis:
    image: redis:7-alpine
    container_name: textbook-redis-dev
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly yes
      - --requirepass textbook
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "textbook", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Kafka (KRaft mode)
  # ===========================================================================
  kafka:
    image: bitnami/kafka:3.6
    container_name: textbook-kafka-dev
    restart: unless-stopped
    environment:
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - ALLOW_PLAINTEXT_LISTENER=yes
    ports:
      - "9092:9092"
    volumes:
      - kafka_dev_data:/bitnami/kafka
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Temporal Server
  # ===========================================================================
  temporal:
    image: temporalio/auto-setup:1.23.0
    container_name: textbook-temporal-dev
    restart: unless-stopped
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=textbook
      - POSTGRES_PWD=textbook
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
      - "7234:7234"
    volumes:
      - temporal_dev_data:/var/lib/temporal
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Temporal Web UI
  # ===========================================================================
  temporal-web:
    image: temporalio/web:1.23.0
    container_name: textbook-temporal-web-dev
    restart: unless-stopped
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    ports:
      - "8088:8088"
    depends_on:
      - temporal
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Qdrant Vector DB
  # ===========================================================================
  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: textbook-qdrant-dev
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Vault (开发模式)
  # ===========================================================================
  vault:
    image: hashicorp/vault:1.15
    container_name: textbook-vault-dev
    restart: unless-stopped
    environment:
      - VAULT_ADDR=http://127.0.0.1:8200
      - VAULT_DEV_ROOT_TOKEN_ID=textbook-dev-token
      - VAULT_API_ADDR=http://127.0.0.1:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    volumes:
      - vault_dev_data:/vault/data
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Prometheus (开发)
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: textbook-prometheus-dev
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_dev_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # Redis Commander (调试)
  # ===========================================================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: textbook-redis-commander-dev
    restart: unless-stopped
    environment:
      - REDIS_HOSTS=local:redis:6379:textbook
      - HTTP_PORT=8081
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - textbook-dev
    logging: *default-logging

  # ===========================================================================
  # pgAdmin (PostgreSQL 调试)
  # ===========================================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: textbook-pgadmin-dev
    restart: unless-stopped
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@textbook.local
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_LISTEN_PORT=5050
    ports:
      - "5050:5050"
    depends_on:
      - postgres
    networks:
      - textbook-dev
    logging: *default-logging

volumes:
  postgres_dev_data:
  redis_dev_data:
  kafka_dev_data:
  temporal_dev_data:
  qdrant_dev_data:
  vault_dev_data:
  prometheus_dev_data:

networks:
  textbook-dev:
    name: textbook-dev
    driver: bridge
